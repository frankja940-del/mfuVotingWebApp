<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Voter Login</title>
</head>

<body class="login-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img src="mfu-logo.png" alt="MFU Logo" class="mfu-logo" style="height: 70px;">
                <h2 style="color: var(--text-main); margin: 0;">Voter Authentication</h2>
            </div>

            <label>Citizen ID</label>
            <input type="text" id="v-cid" placeholder="Enter 10-digit ID">

            <label>Laser ID</label>
            <input type="password" id="v-laser" placeholder="Enter Back-of-Card ID">

            <button
                onclick="Auth.loginVoter(document.getElementById('v-cid').value, document.getElementById('v-laser').value)"
                style="padding: 1rem; font-size: 1.05rem; margin-top: 0.5rem;">Secure Login</button>

            <p style="text-align: center; margin-top: 1.5rem;"><a href="index.html"
                    style="color: var(--text-muted); text-decoration: none; font-weight: 600;">← Back to Home</a></p>
        </div>
    </div>
    <script>

      const Auth = {
    loginVoter: async (citizen_id, laser_id) => {
        // Basic validation
        if (!citizen_id || !laser_id) {
            alert("Please fill in both Citizen ID and Laser ID.");
            return;
        }

        try {
            const response = await fetch('http://localhost:3000/voter/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ citizen_id, laser_id })
            });

            const data = await response.json();

            if (response.ok) {
                // 1. Save voter data to localStorage
                localStorage.setItem('voterData', JSON.stringify(data.voter));
                
                // 2. Redirect to dashboard
                window.location.href = 'voter-main.html';
            } else {
                // Handle errors (Wrong ID, disabled account, etc.)
                alert(data.message || "Authentication failed");
            }
        } catch (err) {
            console.error("Login Error:", err);
            alert("Could not connect to the authentication server.");
        }
    }
};
    </script>
</body>

</html>
