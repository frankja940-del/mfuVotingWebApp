<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Candidate Registration</title>
</head>

<body class="login-body">
    <div class="auth-wrapper">
        <div class="auth-card" style="border-top-color: var(--mfu-gold);">
            <div class="auth-header">
                <img src="mfu-logo.png" alt="MFU Logo" class="mfu-logo" style="height: 70px;">
                <h2 style="color: var(--text-main); margin: 0;">Initial Registration</h2>
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem;">Register with the ID
                    provided by Admin.</p>
            </div>

            <label>Candidate ID</label>
            <input type="text" id="c-reg-id" placeholder="e.g., CAND-01">

            <label>Create Password</label>
            <input type="password" id="c-reg-pw" placeholder="Create a secure password">

            <button id="register-btn"
                style="padding: 1rem; font-size: 1.05rem; background: var(--text-main); margin-top: 0.5rem;">
                Register Account
            </button>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Already registered? <a href="candidate-login.html"
                    style="color: var(--navy-primary); font-weight: 600;">Login here</a>
            </p>
        </div>
    </div>
    <script src="api/candidate_register.js"></script>
</body>

</html>
